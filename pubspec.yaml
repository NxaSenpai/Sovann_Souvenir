name: khmer_souvenir
description: Browse and order handmade Cambodian gifts and souvenirs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.0

  # Local storage
  shared_preferences: ^2.5.0

  # Map
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^13.0.0

  # Images
  cached_network_image: ^3.4.0

  # UI helpers
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.0
  flutter_animate: ^4.5.0
  photo_view: ^0.15.0
  table_calendar: ^3.2.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.2.0
  lottie: ^3.3.0

  # Supabase
  supabase_flutter: ^2.8.0

  # Fonts
  google_fonts: ^8.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.5.0
  riverpod_generator: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#C8960C"
  adaptive_icon_foreground: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/mock/
    - assets/i18n/

  fonts:
    - family: Hanuman
      fonts:
        - asset: assets/fonts/Hanuman-Regular.ttf
        - asset: assets/fonts/Hanuman-Bold.ttf
          weight: 700